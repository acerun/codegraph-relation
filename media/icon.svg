<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#7B6CF0"/>
            <stop offset="1" stop-color="#5B4BD6"/>
        </linearGradient>
    </defs>

    <!-- Background: brand purple rounded square -->
    <rect width="256" height="256" rx="60" fill="url(#bg)"/>

    <!-- Call-hierarchy connectors: parent -> bus -> three children -->
    <g stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M128 104 L128 128"/>
        <path d="M58 128 L198 128"/>
        <path d="M58 128 L58 156"/>
        <path d="M128 128 L128 156"/>
        <path d="M198 128 L198 156"/>
    </g>

    <!-- Parent node (accent) -->
    <rect x="104" y="56" width="48" height="48" rx="12" fill="#00CEC9"/>

    <!-- Child nodes -->
    <rect x="36" y="156" width="44" height="44" rx="11" fill="#FFFFFF"/>
    <rect x="106" y="156" width="44" height="44" rx="11" fill="#FFFFFF"/>
    <rect x="176" y="156" width="44" height="44" rx="11" fill="#FFFFFF"/>
</svg>
